<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"><title>ImmuneNexus</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; color: #333; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .m { min-width: 90%; width: 100%; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff; border: 1px solid #eaeaea; border-radius: 12px; padding: 24px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .group { margin-bottom: 16px; }
        .group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
        .group input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #e1e1e1; border-radius: 6px; font-family: monospace; }
        .btn { width: 100%; background: #3182ce; color: #fff; border: none; padding: 14px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .item { margin-bottom: 16px; }
        .item label { display: block; font-size: 0.85rem; font-weight: 600; color: #666; margin-bottom: 6px; }
        .val { background: #f7fafc; border: 1px solid #edf2f7; padding: 12px; border-radius: 6px; font-family: monospace; min-height: 20px; word-break: break-all; }
    </style>
</head>
<body>
<div class="m">
    <div style="text-align:center;"><h1>ImmuneNexus Central Hub v1.0</h1><p>항원 결합 구조 분석 및 도킹 구조 예측 엔진</p></div>
    <div class="grid">
        <!-- 기존 UI 왼쪽: 입력 패널 -->
        <div class="panel">
            <h3>🛸 분석 조건 데이터 입력</h3>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
            <div class="group"><label>Peptide Sequence</label><input type="text" id="pin" value="SIINFEKL"></div>
            <div class="group"><label>HLA Allele Type</label><input type="text" id="hin" value="HLA-A*02:01"></div>
            <button class="btn" onclick="run()">⚡ 구조 모델 분석 가속가동</button>
        </div>

        <!-- 기존 UI 오른쪽: 출력 결과 패널 -->
        <div class="panel">
            <h3>🧬 구조 모델 결과 (Output)</h3>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
            <div class="item"><label>MHC Sequence</label><div class="val" id="mhc">접속 대기 중...</div></div>
            <div class="item"><label>MHC Split Type</label><div class="val" id="tcr">접속 대기 중...</div></div>
            <div class="item"><label>AlphaFold Input</label><div class="val" id="af">접속 대기 중...</div></div>
            <div class="item"><label>Docking Free Energy</label><div class="val" id="df" style="font-weight: bold;">접속 대기 중...</div></div>
            <div class="item"><label>Safety Verdict</label><div class="val" id="sv" style="font-weight: bold;">접속 대기 중...</div></div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://onrender.com";

    async function run() {
        const p = document.getElementById("pin").value.trim();
        const h = document.getElementById("hin").value.trim();

        if (!p || !h) {
            alert("Peptide 및 HLA 데이터를 모두 입력해 주세요.");
            return;
        }

        // 애니메이션 효과 및 대기 상태 전환
        document.getElementById("mhc").innerText = "MHC 아미노산 역전환 변환 중...";
        document.getElementById("tcr").innerText = "TCR Alpha/Beta 서열 최적화 중...";
        document.getElementById("af").innerText = "GNN 임베딩 매핑 변환 중...";
        document.getElementById("df").innerText = "GCN 2단계 추론 연산 중...";
        document.getElementById("sv").innerText = "3D 구조 안정성 검사 중...";

        try {
            // ✨ [상호작용 연동 교정] 백엔드 fixed_api_server.py 규격과 100% 동기화 전송
            const res = await fetch(API_URL + "/api/epitope/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    hla_sequence: h,      // h_sequence 오타를 백엔드 규격에 맞춰 교정완료
                    peptide_sequence: p   // p_sequence 오타를 백엔드 규격에 맞춰 교정완료
                })
            });

            if (!res.ok) throw new Error("서버 내부 추론 연산 실패");
            const data = await res.json();

            // 백엔드가 처리해 준 진짜 AI 산출물 결과 데이터를 기존 5개 UI 박스에 정밀 바인딩
            // 1. MHC Sequence : 알릴 명칭에서 긴 아미노산 사슬 서열로 자동 역전환된 데이터 명시
            document.getElementById("mhc").innerText = data.mhc_real_sequence;

            // 2. MHC Split Type : AI GNN 모델이 역으로 디자인해 낸 최적의 TCR 알파/베타 서열 매핑
            document.getElementById("tcr").innerText = "TRA: " + data.generated_alpha + " / TRB: " + data.generated_beta;

            // 3. AlphaFold Input : 펩타이드 토큰 인덱싱 데이터 매핑 프레임 완공 명시
            document.getElementById("af").innerText = "Peptide Core Framework Tokenized Linked.";

            // 4. Docking Free Energy : 딥러닝 추론 결과물인 TCR 결합 성공 확률과 pLDDT 신뢰 점수 매핑
            document.getElementById("df").innerText = (data.tcr_binding_score * 100).toFixed(2) + "% (pLDDT: " + data.plddt.toFixed(2) + ")";

            // 5. Safety Verdict : 3D 구조 변위 벡터 안정성 등급 판정 결과 매핑 및 폰트 색상 제어
            document.getElementById("sv").innerText = data.stability;
            if (data.stability === "VERY HIGH" || data.stability === "HIGH") {
                document.getElementById("sv").style.color = "#059669"; // 안전 등급 초록색
            } else {
                document.getElementById("sv").style.color = "#e53e3e"; // 위험 등급 빨간색
            }

        } catch (e) {
            alert("Render 백엔드 서버가 활성화(Live) 상태인지 확인해 주세요.");
            document.getElementById("mhc").innerText = "연동 실패";
            document.getElementById("tcr").innerText = "연동 실패";
            document.getElementById("af").innerText = "연동 실패";
            document.getElementById("df").innerText = "연동 실패";
            document.getElementById("sv").innerText = "연동 실패";
        }
    }
</script>
</body>
</html>
