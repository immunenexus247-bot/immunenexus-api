<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ImmuneNexus</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; color: #111; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .w { max-width: 900px; width: 100%; display: flex; flex-direction: column; gap: 30px; }
        .panel { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 32px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .group { margin-bottom: 20px; }
        .group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
        .group input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #e5e5e5; border-radius: 6px; font-family: monospace; }
        .btn { width: 100%; background: #111; color: #fff; border: none; padding: 14px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .item { margin-bottom: 18px; }
        .item label { display: block; font-size: 0.8rem; font-weight: 600; color: #666; margin-bottom: 4px; }
        .val { background: #f9f9f9; border: 1px solid #f0f0f0; padding: 12px; border-radius: 6px; font-family: monospace; min-height: 20px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="w">
        <!-- 🌟 [문구 변경] 요청하신 대로 암 항원 명칭을 지우고, AI 예측 디자인 모델 콘셉트로 완벽 반영 -->
        <div style="text-align:center;">
            <h1>ImmuneNexus Central Data Hub</h1>
            <p style="font-size: 1.1rem; color: #444; font-weight: 500;">글로벌 오픈 베타 - 항원 TCR 결합 예측 디자인 모델 포털</p>
        </div>
        
        <div class="grid">
            <div class="panel">
                <h2>AI 분석 파라미터 기입</h2>
                <div class="group"><label>Peptide Sequence</label><input type="text" id="pIn" value="CTELKLSDY"></div>
                <div class="group"><label>HLA Allele Type</label><input type="text" id="hIn" value="HLA-A*03:01"></div>
                <button class="btn" onclick="run()">오픈 베타 즉시 가동하기</button>
            </div>
            <div class="panel">
                <h2>AI 구조 연산 결과</h2>
                <div class="item"><label>MHC Sequence</label><div class="val" id="oMhc">대기 중...</div></div>
                <div class="item"><label>TCR Split Chain (Core Output)</label><div class="val" id="oTcr" style="font-weight:700;">대기 중...</div></div>
                <!-- 🌟 [법적 상표권 리스크 방지] 명칭을 안전한 단어로 교체 완료 -->
                <div class="item"><label>Structural Feature Vector</label><div class="val" id="oAf">대기 중...</div></div>
                <div class="item"><label>Docking Free Energy</label><div class="val" id="oE" style="font-weight:bold;">대기 중...</div></div>
                <div class="item"><label>Safety Verdict</label><div class="val" id="oV">대기 중...</div></div>
            </div>
        </div>
    </div>

    <script>
        // 🌟 최신 정밀 가동 중인 백엔드 Render 실시간 주소 바인딩 완료
        const API_URL = "https://immunenexus-api-ktbt.onrender.com";

        async function run() {
            const p = document.getElementById('pIn').value.trim();
            const h = document.getElementById('hIn').value.trim();
            
            if(!p || !h) { 
                alert('입력값을 확인해주세요.'); 
                return; 
            }
            
            document.getElementById('oMhc').innerText = '연산 중...'; 
            document.getElementById('oTcr').innerText = '연산 중...';
            document.getElementById('oAf').innerText = '연산 중...'; 
            document.getElementById('oE').innerText = '연산 중...'; 
            document.getElementById('oV').innerText = '연산 중...';
            
                try {
        // 🌟 백엔드가 열어둔 고유 연산 통로(/api/epitope/predict)를 한 자의 오차도 없이 정밀 결속합니다.
        const res = await fetch(`${API_URL}/api/epitope/predict`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'text/plain' // 크롬 브라우저의 OPTIONS 사전 검사 차단 우회
            },
            body: JSON.stringify({ 
                license_tier: "Standard Pro",
                billing_cycle: "monthly",
                account_active_seats_count: 3, current_month_cumulative_usage: 500,
                text_peptide: p,
                text_hla: h
            })
        });

        if(!res.ok) throw new Error("Inference Server Error");
                
                // 백엔드가 돌려준 PlainText 데이터를 안전하게 자바스크립트 객체로 복원
                const responseText = await res.text();
                const responseData = JSON.parse(responseText);
                
                // 🌟 백엔드 리턴 데이터 주머니 내부 키 이름을 화면 칸에 맞게 기계적 정렬 분배
                document.getElementById('oMhc').innerText = responseData.generated_mhc;
                document.getElementById('oTcr').innerText = responseData.generated_alpha + " / " + responseData.generated_beta;
                document.getElementById('oAf').innerText = responseData.vfd_vval_sequence;
                document.getElementById('oE').innerText = responseData.vfd_vval_id2;
                document.getElementById('oV').innerText = responseData.sv_text;
                
                // 안전성 가독성 향상을 위한 컬러 다이내믹스 스위칭 구조
                if (responseData.vfd_vval_indicator === 'APPROVED') {
                    document.getElementById('oV').style.color = '#00875a';
                } else {
                    document.getElementById('oV').style.color = '#ff0000';
                }
                document.getElementById('oV').style.fontWeight = '700';

            } catch(e) {
                alert('Notice: Render 서버가 첫 로드 시 수면 모드 상태일 수 있습니다. 확인을 누르고 버튼을 1번만 더 클릭해 주세요.');
                document.getElementById('oMhc').innerText = 'Inference failure'; 
                document.getElementById('oTcr').innerText = 'Inference failure';
                document.getElementById('oAf').innerText = 'Inference failure'; 
                document.getElementById('oE').innerText = 'Inference failure'; 
                document.getElementById('oV').innerText = 'Inference failure';
            }
        }
    </script>
</body>
</html>
