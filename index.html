<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmuneNexus: 항원 기반 TCR 서열 생성 및 3D 디자인 플랫폼</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #059669;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border: #cbd5e1;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Noto Sans KR', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 40px 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 26px; color: #1e3a8a; font-weight: 700; margin-bottom: 8px; }
        .header p { color: var(--text-muted); font-size: 14px; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 28px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid var(--border); margin-bottom: 20px; }
        .card-title { font-size: 15px; font-weight: 600; color: #1e3a8a; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase; }
        .form-group input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: monospace; }
        .btn-group { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; margin-top: 24px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-secondary { background-color: #e2e8f0; color: var(--text-muted); }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .console-box { background-color: #0f172a; color: #38bdf8; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 12px; max-height: 120px; overflow-y: auto; white-space: pre-wrap; margin-top: 15px; }

        .result-display { display: none; margin-top: 20px; padding-top: 20px; border-top: 2px dashed var(--border); }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: center; margin-bottom: 12px; }
        .result-item { background: #f8fafc; padding: 14px; border-radius: 8px; border: 1px solid var(--border); }
        .result-val { font-size: 22px; font-weight: 700; color: var(--primary); margin-top: 5px; }
        .full-width { grid-column: span 2; background: #f0fdf4; border-color: #bbf7d0; }

        .tcr-output-box { background: #f8fafc; padding: 16px; border-radius: 12px; margin-bottom: 18px; border: 1px solid #cbd5e1; line-height: 1.8; }
        .tcr-output-box strong { color: #1e3a8a; font-size: 13px; }
        .sequence-span { font-family: monospace; font-weight: 700; color: #0f172a; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-size: 12px; word-break: break-all; display: inline-block; max-height: 80px; overflow-y: auto; width: 100%; vertical-align: middle; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>ImmuneNexus TCR Generator</h1>
        <p>항원 데이터를 기반으로 한 TCR 서열 최적화 생성 및 디자인 플랫폼</p>
    </div>

    <!-- 1. 제어 코어 -->
    <div class="card">
        <div class="card-title">⚙️ AI 분석 제어 코어</div>
        <div class="btn-group">
            <button class="btn-secondary" onclick="testHealthCheck()">엔진 점검</button>
            <button id="predictBtn" class="btn-primary" onclick="testPredict()">TCR 서열 생성 및 디자인 가동</button>
        </div>
        <div class="console-box" id="logConsole">인프라 시스템 구동 준비 완료...</div>
    </div>

    <!-- 2. 오직 2개만 받는 입력창 구조 -->
    <div class="card">
        <div class="card-title">🧬 입력 데이터 (Input)</div>
        <div class="form-group">
            <label>TARGET EPITOPE PEPTIDE SEQUENCE</label>
            <input type="text" id="peptideInput" value="SIINFEKL" placeholder="항원 펩타이드 서열을 입력하세요">
        </div>
        <div class="form-group">
            <label>TARGET HLA ALLELE NAME OR SEQUENCE</label>
            <input type="text" id="hlaInput" value="HLA-A*02:01" placeholder="예시: HLA-A*02:01 또는 GSHSMRY...">
        </div>

        <!-- 3. AI 모델 연산의 결과물창 (Output - 서열 3종 + 점수 3종) -->
        <div class="result-display" id="resultDashboard">
            <div class="card-title" style="color: var(--success); margin-bottom: 12px;">📊 AI 모델 예측 및 디자인 산출물 (Outputs)</div>

            <div class="tcr-output-box">
                🧬 <strong>AI 생성 및 매핑 서열 (Generated Sequences)</strong><br>
                • <strong>TRA CDR3 (Alpha):</strong> <span id="outAlpha" class="sequence-span">-</span><br>
                • <strong>TRB CDR3 (Beta):</strong> <span id="outBeta" class="sequence-span">-</span><br>
                • <strong>MHC (HLA) Real Sequence:</strong> <span id="outHla" class="sequence-span" style="background:#dcfce7;">-</span>
            </div>

            <div class="result-grid">
                <div class="result-item">
                    <label style="font-size: 11px; color: var(--text-muted); font-weight: 600;">TCR 결합 성공률</label>
                    <div class="result-val" id="scoreVal">0.00%</div>
                </div>
                <div class="result-item">
                    <label style="font-size: 11px; color: var(--text-muted); font-weight: 600;">예측 신뢰도 점수 (pLDDT)</label>
                    <div class="result-val" id="plddtVal">0.00</div>
                </div>
                <div class="result-item full-width">
                    <label style="font-size: 11px; color: #065f46; font-weight: 600;">3D 구조 변위 벡터 안정성 등급</label>
                    <div class="result-val" id="confVal" style="color: var(--success); font-size: 24px;">-</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://immunenexus-api.onrender.com";
    const consoleBox = document.getElementById("logConsole");
    const predictBtn = document.getElementById("predictBtn");

    function log(msg) {
        consoleBox.innerText = "[" + new Date().toLocaleTimeString() + "] " + msg + "\n" + consoleBox.innerText;
    }

    async function testHealthCheck() {
        log("📍 원격 예측 인프라 상태 확인 중...");
        try {
            const res = await fetch(API_URL + "/api/health");
            const data = await res.json();
            log("✅ 연결 완벽: 상태 [" + data.status + "] / 엔진 정상");
        } catch (e) {
            log("❌ 인프라 통신 오류: " + e.message);
        }
    }

    async function testPredict() {
        const pep = document.getElementById("peptideInput").value;
        const hla = document.getElementById("hlaInput").value;

        log("⏳ 입력 항원 기반 GNN 생성 엔진 구동 및 추론 시작...");
        predictBtn.disabled = true;
        predictBtn.innerText = "TCR 디자인 추론 중...";

        try {
            const res = await fetch(API_URL + "/api/epitope/predict", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    hla_sequence: hla,
                    peptide_sequence: pep
                })
            });
            const data = await res.json();

            log("✅ AI 모델 산출물 스트림 수신 완료");

            document.getElementById("outAlpha").innerText = data.generated_alpha;
            document.getElementById("outBeta").innerText = data.generated_beta;
            document.getElementById("outHla").innerText = data.mhc_real_sequence;

            document.getElementById("scoreVal").innerText = (data.tcr_binding_score * 100).toFixed(2) + "%";
            document.getElementById("plddtVal").innerText = data.plddt.toFixed(2);
            document.getElementById("confVal").innerText = data.stability;
            document.getElementById("resultDashboard").style.display = "block";

        } catch (e) {
            log("❌ AI 엔진 연산 장애: " + e.message);
        } finally {
            predictBtn.disabled = false;
            predictBtn.innerText = "TCR 서열 생성 및 디자인 가동";
        }
    }
</script>
</body>
</html>
